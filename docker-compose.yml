version: '3.8'

services:
  web:
    build: .
    container_name: student_performance_app
    ports:
      - "8501:8501"
    environment:
      - DB_TYPE=sqlite
      - SQLITE_DB_PATH=student_performance.db
      - SECRET_KEY=production-super-secret-key-change-me
    volumes:
      - .:/app
    restart: always

